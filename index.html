<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sokak adını söyleyin veya yazın, mahallesini öğrenin">
  <meta name="theme-color" content="#0A0E17">
  <title>Sokak Mahalle Bulucu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-deep: #0A0E17;
      --bg-panel: #0F1523;
      --bg-panel-2: #131B2C;
      --line: rgba(255,255,255,0.08);
      --line-strong: rgba(255,255,255,0.14);
      --text-primary: #E7ECF5;
      --text-muted: #7C8797;
      --accent: #FF6B1A;
      --accent-dim: rgba(255,107,26,0.14);
      --cyan: #00E5C7;
      --cyan-dim: rgba(0,229,199,0.14);
      --success: #22D488;
      --success-dim: rgba(34,212,136,0.12);
      --error: #FF4D6D;
      --error-dim: rgba(255,77,109,0.12);
      --mono: 'JetBrains Mono', ui-monospace, monospace;
      --display: 'Space Grotesk', sans-serif;
      --body: 'Inter', -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--body);
      background:
        radial-gradient(circle at 15% 0%, rgba(255,107,26,0.08) 0%, transparent 45%),
        radial-gradient(circle at 85% 100%, rgba(0,229,199,0.06) 0%, transparent 45%),
        var(--bg-deep);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      padding: 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* subtle scanning grid backdrop */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 0;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 20%, black 40%, transparent 100%);
    }

    .container {
      max-width: 480px;
      margin: 1.5rem auto;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      padding-left: 0.15rem;
    }

    .eyebrow .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .header {
      background: linear-gradient(180deg, var(--bg-panel-2), var(--bg-panel));
      border: 1px solid var(--line);
      border-bottom: none;
      border-radius: 1rem 1rem 0 0;
      padding: 2rem 1.75rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .header::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--cyan));
    }

    .icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 0.75rem;
      background: var(--accent-dim);
      border: 1px solid rgba(255,107,26,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.1rem;
      position: relative;
    }

    .icon-wrap::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 1rem;
      border: 1px solid rgba(255,107,26,0.25);
      animation: radar 2.4s ease-out infinite;
    }

    @keyframes radar {
      0% { transform: scale(0.85); opacity: 0.9; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    .icon {
      width: 24px;
      height: 24px;
      color: var(--accent);
    }

    h1 {
      font-family: var(--display);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.92rem;
    }

    .main {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-top: none;
      border-bottom: none;
      padding: 1.75rem;
    }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }

    input {
      width: 100%;
      padding: 0.85rem 1rem;
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--text-primary);
      border: 1px solid var(--line-strong);
      border-radius: 0.6rem;
      margin-bottom: 1.1rem;
      background: rgba(255,255,255,0.02);
      transition: all 0.2s;
    }

    input::placeholder { color: #4A5468; }

    input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255,107,26,0.04);
      box-shadow: 0 0 0 3px rgba(255,107,26,0.12);
    }

    .buttons {
      display: flex;
      gap: 0.6rem;
    }

    button {
      padding: 0.8rem 1.4rem;
      border: 1px solid transparent;
      border-radius: 0.6rem;
      font-family: var(--body);
      font-weight: 600;
      font-size: 0.92rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-search {
      flex: 1;
      background: var(--text-primary);
      color: var(--bg-deep);
    }

    .btn-search:hover {
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(255,255,255,0.15);
    }

    .btn-voice {
      background: var(--accent);
      color: #fff;
      padding: 0.8rem 1.1rem;
    }

    .btn-voice:hover {
      background: #FF7A33;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(255,107,26,0.35);
    }

    .btn-voice.listening {
      animation: pulse 1.3s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,26,0.5); }
      50% { box-shadow: 0 0 0 8px rgba(255,107,26,0); }
    }

    .btn-clear {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--line-strong);
      padding: 0.8rem 1.1rem;
    }

    .btn-clear:hover {
      border-color: var(--text-muted);
      color: var(--text-primary);
    }

    .result {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-radius: 0 0 1rem 1rem;
      padding: 1.75rem;
      border-top: none;
    }

    .result-box {
      border-radius: 0.6rem;
      padding: 1.25rem 1.4rem;
      border: 1px solid;
      background: rgba(255,255,255,0.015);
    }

    .result-success { border-color: rgba(34,212,136,0.35); background: var(--success-dim); }
    .result-error { border-color: rgba(255,77,109,0.35); background: var(--error-dim); }
    .result-warning { border-color: rgba(255,107,26,0.35); background: var(--accent-dim); }
    .result-listening { border-color: rgba(0,229,199,0.35); background: var(--cyan-dim); }

    .result-title {
      font-family: var(--mono);
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      font-weight: 600;
      margin-bottom: 0.6rem;
      text-transform: uppercase;
    }

    .success-title { color: var(--success); }
    .error-title { color: var(--error); }
    .warning-title { color: var(--accent); }
    .listening-title { color: var(--cyan); }

    .sokak-name {
      font-family: var(--mono);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .mahalle-name {
      font-family: var(--display);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-top: 0.35rem;
    }

    .list {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-radius: 1rem;
      padding: 1.75rem;
      margin-top: 1.25rem;
    }

    .list-title {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .list-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--line);
      border-radius: 0.5rem;
      padding: 0.9rem 1.1rem;
      margin-bottom: 0.5rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .list-item:hover {
      border-color: rgba(255,107,26,0.4);
      background: rgba(255,107,26,0.03);
    }

    .list-sokak {
      font-family: var(--mono);
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text-primary);
      text-transform: capitalize;
    }

    .list-mahalle {
      color: var(--text-muted);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .logo-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      text-align: right;
      z-index: 1000;
      opacity: 0.9;
    }

    .logo-trendyol {
      font-family: var(--display);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .logo-trendyol-main {
      color: var(--text-primary);
      font-size: 24px;
      letter-spacing: -0.5px;
    }

    .logo-trendyol-express {
      color: var(--accent);
      font-size: 20px;
      letter-spacing: -0.3px;
    }

    .logo-subtitle {
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .hidden { display: none; }

    @media (max-width: 480px) {
      .logo-container { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="eyebrow"><span class="dot"></span>Konum sorgu sistemi çevrimiçi</div>

    <!-- Başlık -->
    <div class="header">
      <div class="icon-wrap">
        <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>
      <h1>Sokak - Mahalle Bulucu</h1>
      <p class="subtitle">Sokak adını girin, mahallesini öğrenin</p>
    </div>

    <!-- Ana Bölüm -->
    <div class="main">
      <label>Sokak Adı</label>
      <input type="text" id="sokakInput" placeholder="Örn: Yemeni Sokak">

      <div class="buttons">
        <button class="btn-search" onclick="ara()">Ara</button>
        <button class="btn-voice" id="voiceBtn" onclick="sesliAra()">🎤</button>
        <button class="btn-clear" onclick="temizle()">Temizle</button>
      </div>
    </div>

    <!-- Sonuç -->
    <div id="result" class="result hidden"></div>

    <!-- Kayıtlı Sokaklar -->
    <div class="list">
      <div class="list-title">Kayıtlı sokaklar</div>
      <div id="sokakListesi"></div>
    </div>
  </div>

  <!-- Logo - Sağ Alt -->
  <div class="logo-container">
    <div class="logo-trendyol">
      <div class="logo-trendyol-main">trendyol</div>
      <div class="logo-trendyol-express">express</div>
    </div>
    <div class="logo-subtitle">UZUN ŞUBE AI</div>
  </div>

  <script>
    // Sokak veritabanı
    const sokaklar = {
      'yemeni sokak': 'Ertuğrul Gazi Mahallesi',
      'çayır sokak': 'Dumlupınar Mahallesi',
      'sekbanlı sokak': 'Ataevler Mahallesi',
      'göksun sokak': 'İstasyon Mahallesi',
      'cami sokak': 'Tepecik Mahallesi'
    };

    let dinliyor = false;

    // Enter tuşuyla arama
    document.getElementById('sokakInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') ara();
    });

    // Arama fonksiyonu
    function ara() {
      const input = document.getElementById('sokakInput').value;
      const aranan = input.toLowerCase().trim();
      const resultDiv = document.getElementById('result');

      if (!aranan) {
        gosterSonuc('error', '❌ Uyarı', 'Lütfen bir sokak adı girin!');
        return;
      }

      const mahalle = sokaklar[aranan];

      if (mahalle) {
        gosterSonuc('success', '✅ Bulundu!', 
          `<div class="sokak-name">${input}</div><div class="mahalle-name">${mahalle}</div>`);
      } else {
        gosterSonuc('warning', '⚠️ Bulunamadı', 'Bu sokak veritabanında bulunamadı.');
      }
    }

    // Sesli konuşma fonksiyonu
    function sesliSoyle(metin) {
      // Önceki konuşmaları iptal et
      window.speechSynthesis.cancel();
      
      const utterance = new SpeechSynthesisUtterance(metin);
      utterance.lang = 'tr-TR';
      utterance.rate = 1.1; // Konuşma hızını artırdık
      utterance.pitch = 1;
      utterance.volume = 1;
      
      // Hemen konuş
      window.speechSynthesis.speak(utterance);
    }

    // Sesli arama
    function sesliAra() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      
      if (!SpeechRecognition) {
        gosterSonuc('error', '❌ Uyarı', 'Tarayıcınız ses tanımayı desteklemiyor. Lütfen Chrome veya Edge kullanın.');
        sesliSoyle('Tarayıcınız ses tanımayı desteklemiyor.');
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = 'tr-TR';
      recognition.continuous = false;
      recognition.interimResults = false;

      const voiceBtn = document.getElementById('voiceBtn');

      recognition.onstart = () => {
        dinliyor = true;
        voiceBtn.classList.add('listening');
        voiceBtn.textContent = '🔴 Dinliyor...';
        gosterSonuc('listening', '🎤 Dinliyorum', 'Sokak adını söyleyin...');
      };

      recognition.onresult = (event) => {
        const sesliBilgi = event.results[0][0].transcript;
        document.getElementById('sokakInput').value = sesliBilgi;
        
        const aranan = sesliBilgi.toLowerCase().trim();
        const mahalle = sokaklar[aranan];

        if (mahalle) {
          gosterSonuc('success', '✅ Bulundu!', 
            `<div class="sokak-name">${sesliBilgi}</div><div class="mahalle-name">${mahalle}</div>`);
          // Sesli cevap - sadece mahalle adı
          sesliSoyle(mahalle);
        } else {
          gosterSonuc('warning', '⚠️ Bulunamadı', 'Bu sokak veritabanında bulunamadı.');
          sesliSoyle('Bulunamadı');
        }
      };

      recognition.onerror = () => {
        gosterSonuc('error', '❌ Hata', 'Ses tanıma hatası. Lütfen tekrar deneyin.');
        sesliSoyle('Ses tanıma hatası. Lütfen tekrar deneyin.');
      };

      recognition.onend = () => {
        dinliyor = false;
        voiceBtn.classList.remove('listening');
        voiceBtn.textContent = '🎤';
      };

      recognition.start();
    }

    // Temizle
    function temizle() {
      document.getElementById('sokakInput').value = '';
      document.getElementById('result').classList.add('hidden');
    }

    // Sonuç göster
    function gosterSonuc(tip, baslik, mesaj) {
      const resultDiv = document.getElementById('result');
      const tipClass = `result-${tip}`;
      const titleClass = `${tip}-title`;

      resultDiv.innerHTML = `
        <div class="result-box ${tipClass}">
          <div class="result-title ${titleClass}">${baslik}</div>
          <div>${mesaj}</div>
        </div>
      `;
      resultDiv.classList.remove('hidden');
    }

    // Sokak listesini oluştur
    function sokakListesiOlustur() {
      const liste = document.getElementById('sokakListesi');
      Object.entries(sokaklar).forEach(([sokak, mahalle]) => {
        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerHTML = `
          <div class="list-sokak">${sokak}</div>
          <div class="list-mahalle">${mahalle}</div>
        `;
        liste.appendChild(item);
      });
    }

    // Sayfa yüklendiğinde listeyi oluştur
    sokakListesiOlustur();
  </script>
</body>
</html>
