<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sokak adını söyleyin veya yazın, mahallesini öğrenin">
  <meta name="theme-color" content="#0A0E17">
  <title>Sokak Mahalle Bulucu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-deep: #0A0E17;
      --bg-panel: #0F1523;
      --bg-panel-2: #131B2C;
      --line: rgba(255,255,255,0.08);
      --line-strong: rgba(255,255,255,0.14);
      --text-primary: #E7ECF5;
      --text-muted: #7C8797;
      --accent: #FF6B1A;
      --accent-dim: rgba(255,107,26,0.14);
      --cyan: #00E5C7;
      --cyan-dim: rgba(0,229,199,0.14);
      --success: #22D488;
      --success-dim: rgba(34,212,136,0.12);
      --error: #FF4D6D;
      --error-dim: rgba(255,77,109,0.12);
      --blue: #3B9EFF;
      --blue-dim: rgba(59,158,255,0.12);
      --yellow: #FACC15;
      --yellow-dim: rgba(250,204,21,0.12);
      --gray: #8B96A8;
      --gray-dim: rgba(139,150,168,0.12);
      --white-grp: #CBD4E1;
      --white-dim: rgba(203,212,225,0.1);
      --mono: 'JetBrains Mono', ui-monospace, monospace;
      --display: 'Space Grotesk', sans-serif;
      --body: 'Inter', -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--body);
      background:
        radial-gradient(circle at 15% 0%, rgba(255,107,26,0.08) 0%, transparent 45%),
        radial-gradient(circle at 85% 100%, rgba(0,229,199,0.06) 0%, transparent 45%),
        var(--bg-deep);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      padding: 1rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 0;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 20%, black 40%, transparent 100%);
    }

    .container {
      max-width: 960px;
      margin: 1.5rem auto;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: var(--cyan);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      padding-left: 0.15rem;
    }

    .eyebrow .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .header {
      background: linear-gradient(180deg, var(--bg-panel-2), var(--bg-panel));
      border: 1px solid var(--line);
      border-bottom: none;
      border-radius: 1rem 1rem 0 0;
      padding: 0.75rem 2rem 0.75rem;
      position: relative;
      overflow: hidden;
      text-align: left;
    }

    .header::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--cyan));
    }

    h1 {
      font-family: var(--display);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.92rem;
    }

    .main {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-top: none;
      border-bottom: none;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: flex-end;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .field {
      flex: 1 1 340px;
    }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }

    input {
      width: 100%;
      padding: 0.85rem 1rem;
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--text-primary);
      border: 1px solid var(--line-strong);
      border-radius: 0.6rem;
      background: rgba(255,255,255,0.02);
      transition: all 0.2s;
    }

    input::placeholder { color: #4A5468; }

    input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255,107,26,0.04);
      box-shadow: 0 0 0 3px rgba(255,107,26,0.12);
    }

    .buttons {
      display: flex;
      gap: 0.6rem;
      flex: 0 0 auto;
    }

    @media (max-width: 640px) {
      .main { flex-direction: column; align-items: stretch; }
      .field { flex: 1 1 auto; }
      .buttons { flex-direction: row; }
    }

    button {
      padding: 0.8rem 1.4rem;
      border: 1px solid transparent;
      border-radius: 0.6rem;
      font-family: var(--body);
      font-weight: 600;
      font-size: 0.92rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-search {
      flex: 1;
      background: var(--text-primary);
      color: var(--bg-deep);
    }

    .btn-search:hover {
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(255,255,255,0.15);
    }

    .btn-voice {
      background: var(--accent);
      color: #fff;
      padding: 0.8rem 1.1rem;
    }

    .btn-voice:hover {
      background: #FF7A33;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(255,107,26,0.35);
    }

    .btn-voice.listening {
      animation: pulse 1.3s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,26,0.5); }
      50% { box-shadow: 0 0 0 8px rgba(255,107,26,0); }
    }

    .btn-clear {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--line-strong);
      padding: 0.8rem 1.1rem;
    }

    .btn-clear:hover {
      border-color: var(--text-muted);
      color: var(--text-primary);
    }

    .result {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-radius: 0 0 1rem 1rem;
      padding: 1.75rem;
      border-top: none;
    }

    .result-box {
      border-radius: 0.6rem;
      padding: 1.25rem 1.4rem;
      border: 1px solid;
      background: rgba(255,255,255,0.015);
    }

    .result-success { border-color: rgba(34,212,136,0.35); background: var(--success-dim); }
    .result-error { border-color: rgba(255,77,109,0.35); background: var(--error-dim); }
    .result-warning { border-color: rgba(255,107,26,0.35); background: var(--accent-dim); }
    .result-listening { border-color: rgba(0,229,199,0.35); background: var(--cyan-dim); }

    .result-title {
      font-family: var(--mono);
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      font-weight: 600;
      margin-bottom: 0.6rem;
      text-transform: uppercase;
    }

    .success-title { color: var(--success); }
    .error-title { color: var(--error); }
    .warning-title { color: var(--accent); }
    .listening-title { color: var(--cyan); }

    .sokak-name {
      font-family: var(--mono);
      color: var(--text-muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .mahalle-name {
      font-family: var(--display);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-top: 0.35rem;
    }

    .sonaramalar-wrap {
      max-width: 960px;
      margin: 1.25rem auto 0;
    }

    .sonaramalar-section {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-radius: 1rem;
      padding: 1.25rem 1.5rem;
    }

    .sonaramalar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .sonaramalar-title {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cyan);
    }

    .btn-sonaramalar-temizle {
      background: transparent;
      border: 1px solid var(--line-strong);
      color: var(--text-muted);
      padding: 0.35rem 0.75rem;
      font-size: 0.75rem;
      border-radius: 2rem;
    }

    .btn-sonaramalar-temizle:hover {
      border-color: var(--error);
      color: var(--error);
    }

    .sonaramalar-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .chip-sonarama {
      background: rgba(0,229,199,0.06);
      border: 1px solid rgba(0,229,199,0.3);
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      font-family: var(--body);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--cyan);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: capitalize;
    }

    .chip-sonarama:hover {
      background: var(--cyan);
      border-color: var(--cyan);
      color: var(--bg-deep);
    }

    .chip-sonarama .chip-mahalle {
      font-family: var(--mono);
      font-size: 0.7rem;
      opacity: 0.75;
      margin-left: 0.35rem;
      text-transform: none;
    }

    .mahalle-wrap {
      max-width: 960px;
      margin: 1.25rem auto 0;
    }

    .mahalle-section {
      background: var(--bg-panel);
      border: 1px solid var(--line);
      border-radius: 1rem;
      padding: 1.75rem 2rem;
    }

    .mahalle-section-title {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
    }

    .mahalle-groups {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1.1rem 1.4rem;
    }

    @media (max-width: 760px) {
      .mahalle-groups { grid-template-columns: 1fr; }
    }

    .grup-card {
      border: 1px solid var(--line);
      border-radius: 0.75rem;
      padding: 1rem 1.1rem;
      background: rgba(255,255,255,0.012);
      position: relative;
      overflow: hidden;
    }

    .grup-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--grup-renk, var(--accent));
      opacity: 0.7;
    }

    .grup-card-title {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .grup-card-title .grup-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--grup-renk, var(--accent));
      box-shadow: 0 0 6px var(--grup-renk, var(--accent));
      flex-shrink: 0;
    }

    .mahalle-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .btn-mahalle {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--line-strong);
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      font-family: var(--body);
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-mahalle:not([class*="btn-mahalle-"]):hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-mahalle.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Grup renkleri */
    .btn-mahalle-gri { border-color: rgba(139,150,168,0.4); color: var(--gray); }
    .btn-mahalle-gri:hover, .btn-mahalle-gri.active { background: var(--gray); border-color: var(--gray); color: #0A0E17; }

    .btn-mahalle-yesil { border-color: rgba(34,212,136,0.4); color: var(--success); }
    .btn-mahalle-yesil:hover, .btn-mahalle-yesil.active { background: var(--success); border-color: var(--success); color: #0A0E17; }

    .btn-mahalle-kirmizi { border-color: rgba(255,77,109,0.4); color: var(--error); }
    .btn-mahalle-kirmizi:hover, .btn-mahalle-kirmizi.active { background: var(--error); border-color: var(--error); color: #0A0E17; }

    .btn-mahalle-mavi { border-color: rgba(59,158,255,0.4); color: var(--blue); }
    .btn-mahalle-mavi:hover, .btn-mahalle-mavi.active { background: var(--blue); border-color: var(--blue); color: #0A0E17; }

    .btn-mahalle-sari { border-color: rgba(250,204,21,0.4); color: var(--yellow); }
    .btn-mahalle-sari:hover, .btn-mahalle-sari.active { background: var(--yellow); border-color: var(--yellow); color: #0A0E17; }

    .btn-mahalle-beyaz { border-color: rgba(203,212,225,0.35); color: var(--white-grp); background: rgba(255,255,255,0.03); }
    .btn-mahalle-beyaz:hover, .btn-mahalle-beyaz.active { background: var(--white-grp); border-color: var(--white-grp); color: #0A0E17; }

    .btn-mahalle-turuncu { border-color: rgba(255,107,26,0.4); color: var(--accent); }
    .btn-mahalle-turuncu:hover, .btn-mahalle-turuncu.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Grup ayırıcı */
    .grup-ayirici {
      width: 100%;
      height: 1px;
      background: var(--line);
      margin: 0.5rem 0;
    }

    .mahalle-detail {
      margin-top: 1.5rem;
      border-top: 1px solid var(--line);
      padding-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .mahalle-detail-title {
      font-family: var(--display);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
    }

    .btn-geri {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0;
    }

    .btn-geri:hover { color: var(--accent); }

    .sokak-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--line);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      margin-bottom: 0.4rem;
      font-family: var(--mono);
      font-weight: 500;
      color: var(--text-primary);
      text-transform: capitalize;
      transition: all 0.2s;
    }

    .sokak-item:hover {
      border-color: var(--accent);
      background: rgba(255,107,26,0.04);
      transform: translateX(4px);
      color: var(--accent);
    }

    .logo-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      text-align: right;
      z-index: 1000;
      opacity: 0.9;
    }

    .logo-trendyol {
      font-family: var(--display);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .logo-trendyol-main {
      color: var(--text-primary);
      font-size: 24px;
      letter-spacing: -0.5px;
    }

    .logo-trendyol-express {
      color: var(--accent);
      font-size: 20px;
      letter-spacing: -0.3px;
    }

    .logo-subtitle {
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5,7,12,0.72);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 1rem;
    }

    .modal-overlay.hidden { display: none; }

    .modal-box {
      background: var(--bg-panel);
      border: 1px solid var(--line-strong);
      border-radius: 1rem;
      width: 100%;
      max-width: 420px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    .modal-header {
      background: var(--bg-panel-2);
      border-bottom: 1px solid var(--line);
      color: var(--text-primary);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }

    .modal-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--cyan));
    }

    .modal-header-title {
      font-family: var(--display);
      font-size: 1.15rem;
      font-weight: 700;
    }

    .modal-close {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line-strong);
      color: var(--text-primary);
      font-size: 1.1rem;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
    }

    .modal-close:hover { background: rgba(255,107,26,0.15); border-color: var(--accent); }

    .modal-body {
      overflow-y: auto;
      padding: 1.25rem;
    }

    .modal-sokak-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.5rem;
    }

    @media (max-width: 560px) {
      .modal-sokak-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 380px) {
      .modal-sokak-grid { grid-template-columns: 1fr; }
    }

    .modal-sokak-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--line);
      border-radius: 0.5rem;
      padding: 0.55rem 0.4rem;
      font-family: var(--mono);
      font-weight: 500;
      font-size: 0.72rem;
      line-height: 1.25;
      color: var(--text-primary);
      text-transform: capitalize;
      text-align: center;
      word-break: break-word;
      transition: all 0.2s;
    }

    .modal-sokak-item:hover {
      border-color: var(--accent);
      background: rgba(255,107,26,0.06);
      color: var(--accent);
      transform: translateY(-2px);
    }

    .modal-alt-baslik {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--accent);
      margin: 1.1rem 0 0.6rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--line);
    }

    .modal-alt-baslik:first-child {
      margin-top: 0;
    }

    .modal-kisi-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
    }

    @media (max-width: 480px) {
      .modal-kisi-grid { grid-template-columns: 1fr; }
    }

    .modal-kisi-kart {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--line-strong);
      border-radius: 0.75rem;
      padding: 1rem 0.75rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-kisi-kart:hover {
      border-color: var(--accent);
      background: rgba(255,107,26,0.06);
      transform: translateY(-2px);
    }

    .modal-kisi-ad {
      font-family: var(--display);
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-primary);
      margin-bottom: 0.35rem;
    }

    .modal-kisi-sayi {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .modal-geri-satir {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-muted);
      cursor: pointer;
      margin-bottom: 1rem;
      display: inline-block;
      transition: color 0.2s;
    }

    .modal-geri-satir:hover {
      color: var(--accent);
    }

    .hidden { display: none; }

    @media (max-width: 480px) {
      .logo-container { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="eyebrow"><span class="dot"></span>Konum sorgu sistemi çevrimiçi</div>

    <!-- Başlık -->
    <div class="header">
      <h1>Sokak - Mahalle Bulucu</h1>
      <p class="subtitle">Sokak adını girin, mahallesini öğrenin</p>
    </div>

    <!-- Ana Bölüm -->
    <div class="main">
      <div class="field">
        <label>Sokak Adı</label>

      return str
        .toLocaleLowerCase('tr')
        .replace(/[.,]/g, '')
        .replace(/\b(sokak|sokağı|sk|caddesi|cadde|cad|bulvarı|bulvari|meydanı|meydani)\b/g, '')
        .replace(/\s+/g, ' ')
        .trim();

    const sokaklarNormalize = {};
    Object.keys(sokaklar).forEach(key => {
      const norm = normalizeSokakAdi(key);
      if (!(norm in sokaklarNormalize)) {
        sokaklarNormalize[norm] = key;
      }
    });

    // Girilen/söylenen sokak adına göre mahalleyi bulur (önce tam eşleşme, sonra esnek eşleşme)
    function sokakBul(girilenAd) {
      const aranan = girilenAd.toLocaleLowerCase('tr').trim();

      if (sokaklar[aranan]) return sokaklar[aranan];

      const normAranan = normalizeSokakAdi(girilenAd);
      const eslesenKey = sokaklarNormalize[normAranan];
      if (eslesenKey) return sokaklar[eslesenKey];

      return null;
    }


    // Mahalle sorumluları
    const mahalleSorumlulari = {
      'Acısu 1': 'Enes Durmuş',
      'Maşukiye': 'Enes Durmuş',
      'Arslanbey 1': 'Abdülkadir Selvi',
      'Rahmiye': 'Abdülkadir Selvi',
      'Balaban': 'Muhammet İbrahimoğlu',
      'Derbent': 'Selim Yıldız',
      'Acısu 2': 'Selim Yıldız',
      'Suadiye': 'Kadir Yıldız',
      'Çepni': 'Kadir Yıldız',
      'Şevkatiye': 'Berk Semerci',
      'Arslanbey 2': 'Berk Semerci',
      'Ataevler 1': 'Yalçın Akyüz',
      'Emekevler 2': 'Yalçın Akyüz',
      'Ataevler 2': 'Furkan Özbay',
      'Ataevler 3': 'Furkan Kaynak',
      'Uzunçiftlik': 'Hüseyin Örengül',
      'Dumlupınar 1': 'Tolga Örengül',
      'Dumlupınar 2': 'Osman Örengül',
      'Ertuğrul Gazi': 'Burak Özer',
      'Eşme': 'Semih Şimşek',
      'İbrikdere': 'Semih Şimşek',
      'Uzuntarla': 'Semih Şimşek',
      'FSM': 'İbrahim Gökırmak',
      'Sarımeşe 2': 'Arif Emre',
      'Köseköy 1': 'Burak Güler',
      'İstasyon 1': 'İdris Maden',
      'İstasyon 2': 'İbrahim Gökırmak',
      'İstasyon 3': 'Arif Emre Teper',
      'Karabaş 1': 'Bilal Uçar',
      'Karabaş 2': 'Eyüp Kılıç',
      'Körfez 1': 'Kenan Oruç',
      'Tepecik': 'Zeki Kanpara',
      'Körfez 2': 'Mustafa Tayyip',
      'Emekevler 1': 'Eyüp Gençtürk',
      'Sarımeşe 1': 'Şaban Öz',
      'Şirinsulhiye': 'Muhammet İbrahimoğlu',
      'Ömerağa 1': 'Bilal Uçar'
    };

    function sorumluGetir(mahalle) {
      return mahalleSorumlulari[mahalle] || mahalle;
    }

    // Sokak listesini Türkçe alfabetik sıraya göre diz
    function sokaklariSirala(liste) {
      return [...liste].sort((a, b) => a.localeCompare(b, 'tr'));
    }

    // --- Son Aranananlar ---
    const SON_ARAMALAR_ANAHTAR = 'sokakBulucu_sonAramalar';
    const SON_ARAMALAR_MAKS = 10;

    function sonAramalariGetir() {
      try {
        const veri = localStorage.getItem(SON_ARAMALAR_ANAHTAR);
        return veri ? JSON.parse(veri) : [];
      } catch (e) {
        return [];
      }
    }

    function sonAramaEkle(sokakAdi, mahalle) {
      let liste = sonAramalariGetir();
      // Aynı sokak zaten listede varsa çıkar, en başa tekrar eklenecek
      liste = liste.filter(item => item.sokak.toLocaleLowerCase('tr') !== sokakAdi.toLocaleLowerCase('tr'));
      liste.unshift({ sokak: sokakAdi, mahalle: mahalle });
      liste = liste.slice(0, SON_ARAMALAR_MAKS);
      try {
        localStorage.setItem(SON_ARAMALAR_ANAHTAR, JSON.stringify(liste));
      } catch (e) { /* depolama kullanılamıyorsa sessizce geç */ }
      sonAramalariGoster();
    }

    function sonAramalariTemizle() {
      try {
        localStorage.removeItem(SON_ARAMALAR_ANAHTAR);
      } catch (e) { /* yoksay */ }
      sonAramalariGoster();
    }

    function sonAramalariGoster() {
      const liste = sonAramalariGetir();
      const wrap = document.getElementById('sonAramalarWrap');
      const chipsDiv = document.getElementById('sonAramalarChips');

      if (!liste.length) {
        wrap.classList.add('hidden');
        return;
      }

      wrap.classList.remove('hidden');
      chipsDiv.innerHTML = '';

      liste.forEach(item => {
        const chip = document.createElement('button');
        chip.className = 'chip-sonarama';
        chip.innerHTML = `${item.sokak}<span class="chip-mahalle">${item.mahalle}</span>`;
        chip.onclick = () => {
          document.getElementById('sokakInput').value = item.sokak;
          ara();
        };
        chipsDiv.appendChild(chip);
      });
    }

    let dinliyor = false;

    // Enter tuşuyla arama
    document.getElementById('sokakInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') ara();
    });

    // Arama fonksiyonu
    function ara() {
      const input = document.getElementById('sokakInput').value;
      const aranan = input.toLowerCase().trim();
      const resultDiv = document.getElementById('result');

      if (!aranan) {
        gosterSonuc('error', '❌ Uyarı', 'Lütfen bir sokak adı girin!');
        return;
      }

      const mahalle = sokakBul(input);

      if (mahalle) {
        gosterSonuc('success', '✅ Bulundu!', 
          `<div class="sokak-name">${input}</div><div class="mahalle-name">${mahalle}</div>`);
        sesliSoyle(sorumluGetir(mahalle));
        sonAramaEkle(input, mahalle);
      } else {
        gosterSonuc('warning', '⚠️ Bulunamadı', 'Bu sokak veritabanında bulunamadı.');
      }
    }

    // Sesli konuşma fonksiyonu
    function sesliSoyle(metin) {
      // Önceki konuşmaları iptal et
      window.speechSynthesis.cancel();
      
      const utterance = new SpeechSynthesisUtterance(metin);
      utterance.lang = 'tr-TR';
      // "Ali Durmuş" ismi daha net anlaşılsın diye biraz daha yavaş okunur
      utterance.rate = (metin.trim() === 'Ali Durmuş') ? 0.8 : 1.2;
      utterance.pitch = 1;
      utterance.volume = 1;
      
      // Hemen konuş
      window.speechSynthesis.speak(utterance);
    }

    // Sesli arama
    function sesliAra() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      
      if (!SpeechRecognition) {
        gosterSonuc('error', '❌ Uyarı', 'Tarayıcınız ses tanımayı desteklemiyor. Lütfen Chrome veya Edge kullanın.');
        sesliSoyle('Tarayıcınız ses tanımayı desteklemiyor.');
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = 'tr-TR';
      recognition.continuous = false;
      recognition.interimResults = false;

      const voiceBtn = document.getElementById('voiceBtn');

      recognition.onstart = () => {
        dinliyor = true;
        voiceBtn.classList.add('listening');
        voiceBtn.textContent = '🔴 Dinliyor...';
        gosterSonuc('listening', '🎤 Dinliyorum', 'Sokak adını söyleyin...');
      };

      recognition.onresult = (event) => {
        const sesliBilgi = event.results[0][0].transcript;
        document.getElementById('sokakInput').value = sesliBilgi;
        
        const mahalle = sokakBul(sesliBilgi);

        if (mahalle) {
          gosterSonuc('success', '✅ Bulundu!', 
            `<div class="sokak-name">${sesliBilgi}</div><div class="mahalle-name">${mahalle}</div>`);
          sesliSoyle(sorumluGetir(mahalle));
          sonAramaEkle(sesliBilgi, mahalle);
        } else {
          gosterSonuc('warning', '⚠️ Bulunamadı', 'Bu sokak veritabanında bulunamadı.');
          sesliSoyle('Bulunamadı');
        }
      };

      recognition.onerror = () => {
        gosterSonuc('error', '❌ Hata', 'Ses tanıma hatası. Lütfen tekrar deneyin.');
        sesliSoyle('Ses tanıma hatası. Lütfen tekrar deneyin.');
      };

      recognition.onend = () => {
        dinliyor = false;
        voiceBtn.classList.remove('listening');
        voiceBtn.textContent = '🎤';
      };

      recognition.start();
    }

    // Temizle
    function temizle() {
      document.getElementById('sokakInput').value = '';
      document.getElementById('result').classList.add('hidden');
    }

    // Sonuç göster
    function gosterSonuc(tip, baslik, mesaj) {
      const resultDiv = document.getElementById('result');
      const tipClass = `result-${tip}`;
      const titleClass = `${tip}-title`;

      resultDiv.innerHTML = `
        <div class="result-box ${tipClass}">
          <div class="result-title ${titleClass}">${baslik}</div>
          <div>${mesaj}</div>
        </div>
      `;
      resultDiv.classList.remove('hidden');
    }

    // Mahalleleri grupla
    function mahalleSokakMap() {
      const map = {};
      Object.entries(sokaklar).forEach(([sokak, mahalle]) => {
        if (!map[mahalle]) map[mahalle] = [];
        map[mahalle].push(sokak);
      });
      return map;
    }

    // Mahalle grupları
    const mahalleGruplari = [
      {
        renk: 'mavi',
        mahalleler: ['FSM', 'Köseköy 1', 'Sarımeşe 1', 'Sarımeşe 2', 'İstasyon 1', 'İstasyon 2', 'İstasyon 3']
      },
      {
        renk: 'gri',
        mahalleler: ['Acısu 1', 'Acısu 2', 'Arslanbey 1', 'Arslanbey 2', 'Balaban', 'Derbent', 'Maşukiye', 'Rahmiye', 'Suadiye', 'Çepni', 'Şevkatiye', 'Şirinsulhiye']
      },
      {
        renk: 'yesil',
        mahalleler: ['Ataevler 1', 'Ataevler 2', 'Ataevler 3', 'Emekevler 1', 'Emekevler 2', 'Uzunçiftlik']
      },
      {
        renk: 'kirmizi',
        mahalleler: ['Dumlupınar 1', 'Dumlupınar 2', 'Ertuğrul Gazi', 'Eşme', 'İbrikdere', 'Uzuntarla']
      },
      {
        renk: 'sari',
        mahalleler: ['Karabaş 1', 'Tepecik', 'Ömerağa 1']
      },
      {
        renk: 'beyaz',
        mahalleler: ['Körfez 1', 'Körfez 2', 'Karabaş 2']
      }
    ];

    // Grup renklerinin CSS değişken karşılıkları
    const grupRenkDegiskeni = {
      gri: 'var(--gray)',
      yesil: 'var(--success)',
      kirmizi: 'var(--error)',
      mavi: 'var(--blue)',
      sari: 'var(--yellow)',
      beyaz: 'var(--white-grp)'
    };

    // Mahalle butonlarını gruplu, kart bazlı oluştur (3 üstte / 3 altta ızgara)
    function mahalleButonlariOlustur() {
      const map = mahalleSokakMap();
      const container = document.getElementById('mahalleButtons');

      mahalleGruplari.forEach((grup, idx) => {
        const card = document.createElement('div');
        card.className = 'grup-card';
        card.style.setProperty('--grup-renk', grupRenkDegiskeni[grup.renk] || 'var(--accent)');

        const title = document.createElement('div');
        title.className = 'grup-card-title';
        title.innerHTML = `<span class="grup-dot"></span>Bölge ${idx + 1}`;
        card.appendChild(title);

        const btnWrap = document.createElement('div');
        btnWrap.className = 'mahalle-buttons';

        grup.mahalleler.forEach(item => {
          const key = typeof item === 'string' ? item : item.key;
          const label = typeof item === 'string' ? item : item.label;
          if (!map[key]) return;
          const btn = document.createElement('button');
          btn.className = 'btn-mahalle btn-mahalle-' + grup.renk;
          btn.textContent = label;
          btn.onclick = () => mahalleAc(key, btn);
          btnWrap.appendChild(btn);
        });

        card.appendChild(btnWrap);
        container.appendChild(card);
      });
    }

    // Bazı mahalleler birden fazla sorumlu kişiye bölünmüş durumda.
    // Bu mahallenin butonuna tıklanınca, her kişi için ayrı bir alt başlık altında sokaklar gösterilir.
    const bolgeAltGruplari = {
      'FSM': [
        { label: 'İbrahim Gökırmak', key: 'FSM' },
        { label: 'İdris Maden', key: 'İdris Maden' },
        { label: 'Ali Durmuş', key: 'Ali Durmuş' }
      ]
    };

    // Kişi kutucuklarını göster (alt gruplu mahallenin ana ekranı)
    function altGrupKartlariGoster(altGruplar) {
      const map = mahalleSokakMap();
      const body = document.getElementById('modalBody');
      body.innerHTML = '';

      const grid = document.createElement('div');
      grid.className = 'modal-kisi-grid';

      altGruplar.forEach(grup => {
        const sayi = (map[grup.key] || []).length;
        const kart = document.createElement('div');
        kart.className = 'modal-kisi-kart';
        kart.innerHTML = `
          <div class="modal-kisi-ad">${grup.label}</div>
          <div class="modal-kisi-sayi">${sayi} sokak</div>
        `;
        kart.onclick = () => altGrupSokaklariGoster(altGruplar, grup);
        grid.appendChild(kart);
      });

      body.appendChild(grid);
    }

    // Bir kişinin sokak listesini göster (geri dön seçenekli)
    function altGrupSokaklariGoster(altGruplar, grup) {
      const map = mahalleSokakMap();
      const body = document.getElementById('modalBody');
      body.innerHTML = '';

      const geri = document.createElement('div');
      geri.className = 'modal-geri-satir';
      geri.textContent = '← Kişilere dön';
      geri.onclick = () => altGrupKartlariGoster(altGruplar);
      body.appendChild(geri);

      const baslik = document.createElement('div');
      baslik.className = 'modal-alt-baslik';
      baslik.textContent = grup.label;
      body.appendChild(baslik);

      sesliSoyle(grup.label);

      const grid = document.createElement('div');
      grid.className = 'modal-sokak-grid';
      sokaklariSirala(map[grup.key] || []).forEach(sokak => {
        const div = document.createElement('div');
        div.className = 'modal-sokak-item';
        div.textContent = sokak;
        grid.appendChild(div);
      });
      body.appendChild(grid);
    }

    // Mahalle detayını modal olarak aç
    function mahalleAc(mahalle, btnEl) {
      document.querySelectorAll('.btn-mahalle').forEach(b => b.classList.remove('active'));
      btnEl.classList.add('active');

      const altGruplar = bolgeAltGruplari[mahalle];

      if (altGruplar) {
        // Birden fazla sorumlu kişiye bölünmüş mahalle: önce kişi kutucuklarını göster
        document.getElementById('modalBaslik').textContent = '📍 ' + mahalle;
        altGrupKartlariGoster(altGruplar);
      } else {
        const map = mahalleSokakMap();
        const body = document.getElementById('modalBody');
        body.innerHTML = '';
        const sokakListesi = map[mahalle] || [];
        const sorumlu = mahalleSorumlulari[mahalle];
        const baslik = sorumlu ? mahalle + ' - ' + sorumlu : mahalle;
        document.getElementById('modalBaslik').textContent = '📍 ' + baslik;
        sesliSoyle(sorumluGetir(mahalle));
        const grid = document.createElement('div');
        grid.className = 'modal-sokak-grid';
        sokaklariSirala(sokakListesi).forEach(sokak => {
          const div = document.createElement('div');
          div.className = 'modal-sokak-item';
          div.textContent = sokak;
          grid.appendChild(div);
        });
        body.appendChild(grid);
      }

      document.getElementById('modalOverlay').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    // Modalı kapat
    function geriDon() {
      document.getElementById('modalOverlay').classList.add('hidden');
      document.body.style.overflow = '';
      document.querySelectorAll('.btn-mahalle').forEach(b => b.classList.remove('active'));
    }

    // Overlay dışına tıklayınca kapat
    function modalKapat(event) {
      if (event.target === document.getElementById('modalOverlay')) {
        geriDon();
      }
    }

    // Sayfa yüklendiğinde butonları ve son aramaları oluştur
    mahalleButonlariOlustur();
    sonAramalariGoster();
  </script>
</body>
</html>
